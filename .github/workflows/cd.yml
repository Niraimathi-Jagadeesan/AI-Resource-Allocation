name: CD Pipeline

on:
workflow_run:
workflows: ["CI Pipeline"]
types:
- completed

jobs:

deploy-api:
if: ${{ github.event.workflow_run.conclusion == 'success' }}
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 8.0.x

  - name: Restore Dependencies
    run: dotnet restore ./ResourceAllocation.API/ResourceAllocation.API.csproj

  - name: Publish ResourceAllocation.API
    run: dotnet publish ./ResourceAllocation.API/ResourceAllocation.API.csproj -c Release -o publish

  - name: Deploy API to Azure App Service
    uses: azure/webapps-deploy@v3
    with:
      app-name: ai-resource-allocation-api
      publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      package: ./publish
```

deploy-ui:
if: ${{ github.event.workflow_run.conclusion == 'success' }}
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Build And Deploy Angular App
    uses: Azure/static-web-apps-deploy@v1
    with:
      azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      action: "upload"
      app_location: "resource-allocation-ui"
      output_location: "dist"
```
