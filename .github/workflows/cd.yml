name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # Deploy Frontend
      # -------------------------
      - name: Deploy Angular App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "resource-allocation-ui/dist/resource-allocation-ui/browser"

      # -------------------------
      # Setup Node
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install Dependencies
        working-directory: resource-allocation-ui
        run: npm install

      # -------------------------
      # Install Playwright
      # -------------------------
      - name: Install Playwright Browsers
        working-directory: resource-allocation-ui
        run: npx playwright install --with-deps

      # -------------------------
      # Run Cloud Playwright Tests
      # -------------------------
      - name: Run Cloud Playwright Tests
        working-directory: resource-allocation-ui
        env:
          PLAYWRIGHT_BASE_URL: https://ai-resource-allocation-api.azurewebsites.net
        run: npx playwright test --config=playwright.cloud.config.ts

      # -------------------------
      # Upload Reports
      # -------------------------
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cloud-playwright-report
          path: resource-allocation-ui/playwright-report/