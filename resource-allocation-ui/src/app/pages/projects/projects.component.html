<div class="container mt-4">
  <div class="d-flex justify-content-between mb-3">
    <h2>Projects</h2>

    <button
      *ngIf="auth.hasRole('Admin') || auth.hasRole('Manager')"
      class="btn btn-primary"
      (click)="addNew()">
      Add Project
    </button>
  </div>

  <!-- Form -->
  <div *ngIf="showForm" class="card shadow mb-4">
    <div class="card-body">
      <h5>{{ isEditMode ? 'Edit Project' : 'Add Project' }}</h5>

      <div class="row g-3">
        <div class="col-md-6">
          <label>Project Name</label>
          <input class="form-control"
                 [(ngModel)]="model.projectName">
        </div>

        <div class="col-md-6">
          <label>Required Skills</label>
          <input class="form-control"
                 [(ngModel)]="model.requiredSkills"
                 placeholder=".NET,Angular">
        </div>

        <div class="col-md-3">
          <label>Minimum Experience</label>
          <input type="number"
                 class="form-control"
                 [(ngModel)]="model.minimumExperience">
        </div>

        <div class="col-md-3">
          <label>Priority (1-10)</label>
          <input type="number"
                 class="form-control"
                 [(ngModel)]="model.priority">
        </div>

        <div class="col-md-3">
          <label>Complexity</label>
          <select class="form-select"
                  [(ngModel)]="model.complexity">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>

        <div class="col-md-3">
          <label>Start Date</label>
          <input type="date"
                 class="form-control"
                 [(ngModel)]="model.startDate">
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-success me-2"
                (click)="save()">
          Save
        </button>

        <button class="btn btn-secondary"
                (click)="cancel()">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card shadow">
    <div class="card-body">
      <table class="table table-bordered table-hover">
        <thead>
          <tr>
            <th>Name</th>
            <th>Skills</th>
            <th>Min Exp</th>
            <th>Priority</th>
            <th>Complexity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let project of projects">
            <td>{{ project.projectName }}</td>
            <td>{{ project.requiredSkills }}</td>
            <td>{{ project.minimumExperience }}</td>
            <td>{{ project.priority }}</td>
            <td>{{ project.complexity }}</td>
            <td>
              <button
                class="btn btn-sm btn-warning me-2"
                (click)="edit(project)">
                Edit
              </button>

              <button
                *ngIf="auth.hasRole('Admin')"
                class="btn btn-sm btn-danger"
                (click)="delete(project.id)">
                Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
