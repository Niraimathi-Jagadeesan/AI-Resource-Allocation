<div class="container mt-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 id="dashboardTitle">AI Resource Allocation Dashboard</h2>
      <p class="text-muted mb-0">
        Welcome, <strong>{{ username }}</strong>
        ({{ role }})
      </p>
    </div>

    <button
      class="btn btn-outline-danger btn-logout"
      (click)="logout()">
      Logout
    </button>
  </div>

  <!-- Navigation Cards -->
  <div class="row g-4">

    <div class="col-md-3" id="employeeCountCard" *ngIf="auth.hasRole('Admin')">
      <div class="card shadow h-100">
        <div class="card-body text-center">
          <h5>Employees</h5>
          <p class="text-muted">
            Manage employee data
          </p>
          <a
            id="btnEmployeesOpen"
            routerLink="/employees"
            class="btn btn-primary">
            Open
          </a>
        </div>
      </div>
    </div>

    <div id="projectCountCard" [class]="auth.hasRole('Admin') ? 'col-md-3' : 'col-md-4'">
      <div class="card shadow h-100">
        <div class="card-body text-center">
          <h5>Projects</h5>
          <p class="text-muted">
            Manage project requirements
          </p>
          <a
            id="btnProjectsOpen"
            routerLink="/projects"
            class="btn btn-success">
            Open
          </a>
        </div>
      </div>
    </div>

    <div id="recommendationCard" [class]="auth.hasRole('Admin') ? 'col-md-3' : 'col-md-4'">
      <div class="card shadow h-100">
        <div class="card-body text-center">
          <h5>Recommendations</h5>
          <p class="text-muted">
            AI resource suggestions
          </p>
          <a
            id="btnRecommendationsOpen"
            routerLink="/recommendations"
            class="btn btn-warning">
            Open
          </a>
        </div>
      </div>
    </div>

    <div id="riskCard" [class]="auth.hasRole('Admin') ? 'col-md-3' : 'col-md-4'">
      <div class="card shadow h-100">
        <div class="card-body text-center">
          <h5>Risk Analysis</h5>
          <p class="text-muted">
            Project risk prediction
          </p>
          <a
            id="btnRiskOpen"
            routerLink="/risk"
            class="btn btn-danger">
            Open
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
