<div class="container mt-5" style="max-width: 450px;">
  <div class="card shadow">
    <div class="card-body">
      <h3 class="text-center mb-4" id="loginTitle">AI Resource Allocation</h3>

      <div
        *ngIf="errorMessage"
        class="alert alert-danger" id="loginError">
        {{ errorMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input
          type="text"
          class="form-control"
          id="username"
          [(ngModel)]="username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          [(ngModel)]="password">
      </div>

      <button
        class="btn btn-primary w-100"
        (click)="login()"
        id="loginButton"
        [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>

      <div class="mt-3 text-muted small">
        Demo Users:
        <br>
        admin / Admin@123
        <br>
        manager / Manager@123
      </div>
    </div>
  </div>
</div>
